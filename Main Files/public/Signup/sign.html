<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign-Up Page</title>
    
</head>
<style>
    body {
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    background-image: url('background.jpg');
    background-size: cover;
    margin: 0;
    font-family: Arial, sans-serif;
}

.form-container {
    background: rgba(255, 255, 255, 0.8);
    padding: 2rem;
    border-radius: 10px;
    box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
    text-align: center;
}

.title {
    font-size: 2rem;
    margin-bottom: 1rem;
}

.form {
    display: flex;
    flex-direction: column;
}

.input {
    padding: 0.5rem;
    margin-bottom: 1rem;
    border: 1px solid #ccc;
    border-radius: 5px;
}

.form-btn {
    padding: 0.7rem;
    border: none;
    border-radius: 5px;
    background-color: #28a745;
    color: white;
    font-size: 1rem;
    cursor: pointer;
}

.form-btn:hover {
    background-color: #218838;
}

.login-label {
    margin-top: 1rem;
}

.login-link {
    color: #007BFF;
    cursor: pointer;
}

.login-link:hover {
    text-decoration: underline;
}

</style>
<body>
    <div class="form-container">
        <p class="title">Create an Account</p>
        <form class="form" onsubmit="return validateForm()">
            <input type="text" class="input" placeholder="Username" id="username" required>
            <input type="email" class="input" placeholder="Email" id="email" required>
            <input type="password" class="input" placeholder="Password" id="password" required>
            <input type="password" class="input" placeholder="Confirm Password" id="confirm-password" required>
            <button class="form-btn" type="submit">Sign Up</button>
        </form>
        <p class="login-label">
            <!-- Already have an account?<span class="login-link">Log in</span> -->
            Already have an account?<a href="/Login/login.html" class="login-link">Log in</a>
        </p>
    </div>
    <script src="sign.js"></script>
</body>
</html>
