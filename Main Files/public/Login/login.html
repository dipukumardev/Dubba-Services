<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="login.css">
    <title>Login Page</title>
</head>
<body>
    <div class="form-container">
        <p class="title">Welcome back</p>
        <form class="form" onsubmit="return validateForm()">
            <input type="email" class="input" placeholder="Email" id="email" required>
            <input type="password" class="input" placeholder="Password" id="password" required>
            <p class="page-link">
                <span class="page-link-label">Forgot Password?</span>
            </p>
            <button class="form-btn" type="submit">Log in</button>
        </form>
        <p class="sign-up-label">
          Don't have an account? <a href="/public/Signup/sign.html" class="sign-up-link">Sign up</a>
        </p>
    </div>
    <script src="login.js"></script>
</body>
</html>
